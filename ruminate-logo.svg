<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="520" height="200">
  <!-- Ruminate Studio — Full Logo (Symbol + Text) -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@500&amp;display=swap');
    </style>
  </defs>

  <!-- Ripple Symbol -->
  <circle cx="100" cy="100" r="36" fill="none" stroke="#1a1a1a" stroke-width="1.8"/>
  <circle cx="100" cy="100" r="58" fill="none" stroke="#1a1a1a" stroke-width="1.4" opacity="0.7"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="#1a1a1a" stroke-width="1.0" opacity="0.4"/>
  <circle cx="100" cy="100" r="5" fill="#1a1a1a"/>

  <!-- Text: Ruminate Studio -->
  <text x="210" y="96" font-family="'Crimson Pro', serif" font-weight="500" font-size="28" letter-spacing="0.25em" fill="#1a1a1a">Ruminate</text>
  <text x="210" y="128" font-family="'Crimson Pro', serif" font-weight="500" font-size="16" letter-spacing="0.25em" fill="#8a8580">Studio</text>
</svg>
