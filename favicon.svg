  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1a1a1a; }
      .ring { stroke: #fafaf8; }
      .dot { fill: #C44525; }
    }
  </style>
  <rect class="bg" width="32" height="32" rx="6" fill="#fafaf8"/>
  <circle class="dot" cx="16" cy="16" r="3" fill="#C44525"/>
  <circle class="ring" cx="16" cy="16" r="8" fill="none" stroke="#C44525" stroke-width="2" opacity="0.6"/>
  <circle class="ring" cx="16" cy="16" r="13" fill="none" stroke="#8a8580" stroke-width="2" opacity="0.35"/>
</svg>
